version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/device/db/schema.sql"
    queries: "internal/device/db/queries.sql"
    gen:
      go:
        package: "devicedb"
        out: "internal/device/device_repository"
        sql_package: "database/sql"
        emit_json_tags: false
        emit_interface: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type: "string"
          - db_type: "pg_catalog.uuid"
            go_type: "string"
