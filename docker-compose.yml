services:
  device_api:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    depends_on:
      device_database:
        condition: service_healthy
    environment:
      - DB_HOST=device_database

  device_database:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - device_database_volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  device_database_volume:
